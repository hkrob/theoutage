<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Service Health — TheOutage</title>
<link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<nav class="topnav">
  <div class="topnav-inner">
    <a class="brand" href="/"><span class="brand-dot"></span> TheOutage</a>
    <div class="nav-links" id="nav-auth-area"></div>
  </div>
</nav>

<main class="page">
  <div class="container">
    <div class="page-header">
      <div>
        <h1 class="page-title">Service Health</h1>
        <p class="page-subtitle">Live status of every service this site depends on — the one place to check if something's wrong.</p>
      </div>
      <button class="btn btn-primary btn-sm" id="refresh-health-btn" type="button">Refresh</button>
    </div>

    <div id="health-alert-area"></div>

    <div id="health-overall"></div>

    <div id="health-checks">
      <div class="spinner-text">Checking…</div>
    </div>
  </div>

<footer>TheOutage — a public record of major outages.</footer>

<script type="module" src="/js/health.js"></script>
