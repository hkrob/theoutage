<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset password — TheOutage</title>
<link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<nav class="topnav">
  <div class="topnav-inner">
    <a class="brand" href="/"><span class="brand-dot"></span> TheOutage</a>
    <div class="nav-links" id="nav-auth-area"></div>
  </div>
</nav>

<main class="page">
  <div class="container" style="max-width: 420px;">
    <div class="page-header">
      <div>
        <h1 class="page-title">Set a new password</h1>
      </div>
    </div>

    <div id="alert-area"></div>

    <div class="form-card" id="form-card">
      <form id="reset-form">
        <div class="field">
          <label for="password">New password</label>
          <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password" />
          <div class="field-hint">At least 8 characters.</div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary btn-block">Set password</button>
        </div>
      </form>
    </div>
  </div>
</main>

<footer>TheOutage — a public record of major outages.</footer>

<script type="module" src="/js/reset-password.js"></script>
</body>
</html>
