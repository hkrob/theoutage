<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — TheOutage</title>
<link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<nav class="topnav">
  <div class="topnav-inner">
    <a class="brand" href="/"><span class="brand-dot"></span> TheOutage</a>
    <div class="nav-links" id="nav-auth-area"></div>
  </div>
</nav>

<main class="page">
  <div class="container">
    <div class="page-header">
      <div>
        <h1 class="page-title">Admin</h1>
        <p class="page-subtitle">Manage user accounts and access.</p>
      </div>
    </div>

    <div id="admin-alert-area"></div>

    <div class="field" style="max-width: 360px;">
      <label for="user-search">Search users</label>
      <input type="text" id="user-search" placeholder="Email or display name…" />
    </div>

    <div id="admin-users-area">
      <div class="spinner-text">Loading…</div>
    </div>
  </div>
</main>

<footer>TheOutage — a public record of major outages.</footer>

<script type="module" src="/js/admin.js"></script>
