<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — TheOutage</title>
<link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<nav class="topnav">
  <div class="topnav-inner">
    <a class="brand" href="/"><span class="brand-dot"></span> TheOutage</a>
    <div class="nav-links" id="nav-auth-area"></div>
  </div>
</nav>

<main class="page">
  <div class="container">
    <div class="page-header">
      <div>
        <h1 class="page-title">Admin</h1>
        <p class="page-subtitle">Manage user accounts and access.</p>
      </div>
      <button class="btn btn-primary btn-sm" id="show-create-user-btn" type="button">Create user</button>
    </div>

    <div id="admin-alert-area"></div>

    <form id="create-user-form" class="detail-panel" style="display:none; margin-bottom: var(--space-5);">
      <h2 class="section-title">Create user</h2>
      <div style="display:flex; gap: var(--space-4); flex-wrap:wrap;">
        <div class="field" style="flex:2; min-width:200px;">
          <label for="new-user-email">Email</label>
          <input type="email" id="new-user-email" required />
        </div>
        <div class="field" style="flex:2; min-width:200px;">
          <label for="new-user-display-name">Display name</label>
          <input type="text" id="new-user-display-name" placeholder="Defaults to the part before @" />
        </div>
        <div class="field" style="flex:1; min-width:140px;">
          <label for="new-user-role">Access level</label>
          <select id="new-user-role">
            <option value="user" selected>user</option>
            <option value="moderator">moderator</option>
            <option value="admin">admin</option>
          </select>
        </div>
      </div>
      <div class="field-hint">No password is set — they'll get a sign-in link by email, same as signing up themselves.</div>
      <div style="display:flex; gap: var(--space-2); margin-top: var(--space-3);">
        <button class="btn btn-sm btn-primary" type="submit">Create</button>
        <button class="btn btn-sm" id="cancel-create-user-btn" type="button">Cancel</button>
      </div>
    </form>

    <div class="field" style="max-width: 360px;">
      <label for="user-search">Search users</label>
      <input type="text" id="user-search" placeholder="Email or display name…" />
    </div>

    <div id="admin-users-area">
      <div class="spinner-text">Loading…</div>
    </div>
  </div>
</main>

<footer>TheOutage — a public record of major outages.</footer>

<script type="module" src="/js/admin.js"></script>
</body>
</html>
