name = "theoutage-api"
main = "src/index.ts"
compatibility_date = "2026-07-15"
compatibility_flags = ["nodejs_compat"]

# The Worker handles the full hostname so that:
#   - Static assets (HTML/CSS/JS) are served by the [assets] binding below
#   - /api/* routes are handled by the Worker's Hono app
# This collapses the previous Pages-site + separate Worker-route into a single
# deployment, avoiding the route-registration race condition that caused Pages
# to intercept /api/* traffic when the route wasn't registered yet.
# SameSite=Lax on the session cookie is fine because API and static content
# are served from the same origin.
[[routes]]
pattern = "TheOutage.robcloud.qzz.io/*"
zone_name = "robcloud.qzz.io"

# Static-asset binding: Workers serves the Pages frontend files for every
# request path that doesn't match a Worker handler. Requests for /api/* fall
# through to Hono because there are no matching asset files at those paths.
# The directory path is relative to this wrangler.toml file.
[assets]
directory = "../theoutage-pages"

[[d1_databases]]
binding = "DB"
database_name = "theoutage-db"
database_id = "e93c0b69-dd6b-4d51-a2e4-699c5ea460b8"
migrations_dir = "migrations"

# R2 bucket for artifacts — created and live (theoutage-artifacts).
[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "theoutage-artifacts"

[vars]
# Base URL of the deployed app — used to build magic-link / reset-link URLs
# and the post-auth redirect target. Never hardcode the hostname elsewhere.
APP_ORIGIN = "https://TheOutage.robcloud.qzz.io"

SESSION_COOKIE_NAME = "the_outage_session"
SESSION_TTL_DAYS = "30"
MAGIC_LINK_TTL_MIN = "15"
RATE_LIMIT_MAGIC_LINK_PER_HOUR = "3"

# PBKDF2 iteration count for password hashing. Benchmarked at ~0.43ms/1k
# iterations (see src/lib/crypto.ts) — 100k costs ~43ms of CPU, which alone
# exceeds the Workers Free plan's 10ms/request budget. This means the three
# password-touching routes (POST /login, /set-password, /password-reset/confirm)
# will likely hit Cloudflare error 1102 on Free plan and need Workers Paid
# ($5/mo) to run reliably — magic-link auth (the default, spec-preferred
# path) and every other route are unaffected and stay well within Free tier.
# Consider this default a "Paid plan" setting; if staying on Free plan,
# either lower this (still no iteration count here has real headroom) or
# disable the password login path and keep magic-link-only until upgrading.
PBKDF2_ITERATIONS = "100000"

# Secrets — set these with `wrangler secret put <NAME>`, do not commit values:
#   SESSION_HMAC_SECRET   64+ char random hex string, signs the session cookie
#   RESEND_API_KEY        Resend API key
#   RESEND_FROM_EMAIL     verified Resend sender address, e.g. noreply@TheOutage.robcloud.qzz.io
